<head><meta charset="UTF-8"><title>Contrato de Retrospectiva</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>

    img { width: 100%; max-width: 200px; display: block; margin: 0 auto 20px; }

    .btn { background: #25d366; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; margin-top: 10px;}
    input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; box-sizing: border-box; }
</style>
</head>
<body>
<div class="container">
    <img src="https://res.cloudinary.com/dtshawz5x/image/upload/v1780435649/logotipo_jhde8q.png">
    <h1>Contrato de Prestação</h1>
    <label>Nome Completo:</label><input type="text" id="nome" required>
    <label>E-mail:</label><input type="email" id="email" required>
    <label>WhatsApp:</label><input type="tel" id="whatsInput" required>
    <label>Data do Evento:</label><input type="date" id="dataEvento" required>
    <label>Tema da Festa:</label><input type="text" id="tema" required>
    
    <label>Termos:</label>
    <textarea id="termosArea" readonly style="height:150px; font-size: 10px;"># REGRAS E INFORMAÇÕES DA RETROSPECTIVA

1. Informações Visuais da Festa
Você deverá me enviar informações visuais da festa para que eu possa entender a proposta do evento.
Exemplos: Fotos da decoração; Convite da festa.

2. Modelo da Retrospectiva
Vou lhe apresentar um modelo que possuo dentro do tema escolhido. Caso eu não tenha um modelo específico, você poderá visualizar meus trabalhos e avaliações através do primeiro post do meu Instagram, onde também há diversos exemplos disponíveis.
Importante: Os modelos servem apenas como base. Músicas, textos serão personalizados para o seu evento.

3. Valores e Prazos
Vou te passar valores, prazos e tudo que preciso para a produção da sua retrospectiva.

4. Trechos Animados
Os trechos animados são recursos antigos utilizados em retrospectivas. Além de aumentarem a duração do vídeo, podem acabar ficando um pouco fora do tema.
Porém, caso deseje incluí-los, faremos com todo prazer. Basta informar no momento do envio das fotos.
Serão inseridos, em média, de 3 a 5 trechos animados, dependendo da quantidade de fotos e da coerência com a história apresentada.

5. Envio das Fotos
As fotos devem ser enviadas na mesma ordem em que deseja que apareçam na retrospectiva. Envie em uma pasta as fotos numeradas, ou no whatsapp na ordem que devem aparecer na retro.
Importante: Não organizo fotos para clientes.

6. Vídeos e Legendas
- Incluímos até 4 vídeos pessoais sem custo adicional.
- Acima dessa quantidade, será cobrada uma taxa de R$ 5,99 por vídeo excedente.
- Também inserimos entre 5 e 10 legendas ao longo da retrospectiva, dependendo da quantidade de fotos enviadas.

7. Tempo da Retrospectiva
O tempo final varia de acordo com: quantidade de fotos, vídeos, tamanho dos textos e inclusão de trechos animados.
Tempo médio para retrospectivas contendo apenas fotos:
- 80 fotos: aprox. 7 a 8 min
- 100 fotos: aprox. 8 a 10 min
- 120 fotos: aprox. 10 a 12 min
- 150 fotos: aprox. 12 a 15 min
- 200 fotos: aprox. 15 a 20 min
Observação: A inclusão de vídeos pessoais, trechos animados e textos longos aumenta a duração total.

8. Início do Prazo
O prazo de produção começa a contar a partir do recebimento de: todas as informações solicitadas, fotos e materiais necessários, e pagamento do sinal ou valor integral.

9. Prévia para Aprovação
Será enviada uma prévia para aprovação. Caso seja necessário algum ajuste, ele será realizado e uma nova versão será enviada. Após a aprovação, será entregue a versão final.

10. Alterações Após a Entrega Final
Após o envio da retrospectiva final, qualquer alteração solicitada estará sujeita à cobrança de taxa adicional.

11. Entrega da Retrospectiva
A retrospectiva será entregue em formato MP4.
Importante: Teste a retrospectiva no equipamento que será utilizado na festa. Não me responsabilizo pela qualidade, configuração ou funcionamento dos aparelhos utilizados no evento.
O arquivo será enviado pelo WhatsApp ou por um link de download enviado por e-mail, válido por 7 dias.

12. Moldura para Fotos (Brinde)
A moldura para fotos é um brinde e será criada de acordo com o tema da festa. Por se tratar de um brinde, não serão realizadas alterações ou personalizações. Você receberá um link para acesso à moldura e uma arte para impressão contendo um QR Code.
Importante: Não me responsabilizo por problemas de funcionamento decorrentes de aparelhos dos convidados ou instabilidades de internet.

13. Armazenamento dos Arquivos
Não armazeno fotos nem retrospectivas dos clientes. Após 15 dias da entrega, todos os arquivos serão excluídos do meu computador.

14. Alterações no Modelo
Qualquer modificação no modelo escolhido deverá ser informada antes do início da produção da prévia.

15. Ordem das Fotos
Tenha certeza da ordem das fotos enviadas. A retrospectiva será produzida exatamente na sequência em que as fotos forem recebidas. Caso, após assistir à prévia, seja constatado que as fotos foram enviadas em ordem incorreta, será cobrada uma taxa para reorganização.

16. Responsabilidade Após Aprovação Final
Após assistir à retrospectiva final e informar que está tudo correto, não serão aceitas reclamações relacionadas à reprodução do vídeo no dia da festa.
Problemas como: Pen drive corrompido, falha ao baixar, equipamentos com defeito, problemas de configuração, outros fatores externos, são de responsabilidade do cliente.</textarea>
    
    <label>Assinatura:</label>
    <canvas id="canvas"></canvas>
    
    <div style="background:#fff3cd; padding:10px; margin:10px 0; display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="aceite" required style="width: auto; margin: 0;"> 
        <b style="font-size: 14px;">Declaro que li e concordo com TODAS as cláusulas, especialmente os itens 6, 9, 11, 14 e 16.</b>
    </div>
    
    <button class="btn" onclick="gerarPDF()">Gerar PDF e Enviar WhatsApp</button>
</div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.onmousedown = () => drawing = true;
    canvas.onmouseup = () => drawing = false;
    canvas.onmousemove = (e) => { if(!drawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); };
    canvas.ontouchmove = (e) => { e.preventDefault(); const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke(); };
    
    function gerarPDF() {
        if(!document.getElementById('aceite').checked) { alert('Marque o aceite!'); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(14);
        doc.text("CONTRATO DE PRESTACAO DE SERVICOS", 105, 15, {align: 'center'});
        
        doc.setFontSize(8);
        doc.text("Cliente: " + document.getElementById('nome').value, 10, 30);
        doc.text("Email: " + document.getElementById('email').value, 10, 35);
        doc.text("WhatsApp: " + document.getElementById('whatsInput').value, 10, 40);
        doc.text("Data do Evento: " + document.getElementById('dataEvento').value, 10, 45);
        doc.text("Tema: " + document.getElementById('tema').value, 10, 50);
        
        // Novo texto de aceite no PDF
        doc.setFontSize(10);
        doc.text("Aceite: Cliente assinou e concordou com as regras.", 10, 60);
        
        let y = 75; // Começa o texto um pouco mais abaixo
        const lines = doc.splitTextToSize(document.getElementById('termosArea').value, 180);
        
        lines.forEach(line => {
            if (y > 270) { doc.addPage(); y = 20; }
            doc.text(line, 10, y);
            y += 4;
        });
        
        if (y > 250) { doc.addPage(); y = 20; }
        doc.text("Assinatura do Cliente:", 10, y + 10);
        doc.addImage(canvas.toDataURL(), 'PNG', 10, y + 15, 50, 20);
        
        doc.save('Contrato.pdf');
        window.open('https://wa.me/5571993233142?text=Enviei meu contrato assinado.');
    }
</script>
</body>
</html>
